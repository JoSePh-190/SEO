<!DOCTYPE html>
<html lang="en">
<head>

<title>
{% block title %}Gbarabe Tordi Joseph{% endblock %}
</title>

      ">

<meta property="og:type" content="website">

<meta property="og:title"
      content="Gbarabe Tordi Joseph">

<meta property="og:description"

<meta property="og:url"
      content="{{ request.build_absolute_uri }}">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description"
      content="{{ blog.excerpt | default:'Petroleum Engineering Student and Software Developer at the University of Port Harcourt' }}">

<script type="application/ld+json">
{
  "@context":"https://schema.org",
  "@type":"Person",
  "name":"Gbarabe Tordi Joseph",

  "url":"https://your-domain.com",
  "knowsAbout":[
      "Python",

      "@type":"CollegeOrUniversity",

  }

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
/* ── Design tokens ────────────────────────────────── */
:root {
  --bg:          #0B1120;
  --surface:     #131d33;
  --surface-2:   #192540;
  --border:      #1e2e4a;
  --text:        #EEF0F4;
  --muted:       #6B7A99;
  --accent:      #E8A94D;
  --accent-glow: rgba(232,169,77,.15);
  --display:     'Space Grotesk', sans-serif;
  --body:        'Inter', sans-serif;
  --nav-h:       60px;
  --radius:      10px;
}

/* ── Reset ────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  font-size: 1rem;
  line-height: 1.75;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }
ul, ol { padding-left: 1.4rem; }
li { margin-bottom: .35rem; }

/* ── Nav ──────────────────────────────────────────── */
nav {
  position: sticky;
  top: 0;
  z-index: 200;
  height: var(--nav-h);
  background: rgba(11,17,32,.88);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  padding: 0 clamp(1.25rem, 5vw, 3rem);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.nav-logo {
  font-family: var(--display);
  font-weight: 700;
  font-size: .95rem;
  letter-spacing: -.02em;
  display: flex;
  align-items: center;
  gap: .5rem;
  white-space: nowrap;
  z-index: 201;
}
.nav-logo::before {
  content: '';
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

/* Desktop links */
.nav-links {
  display: flex;
  align-items: center;
  gap: 2rem;
}
.nav-links a {
  font-family: var(--display);
  font-size: .875rem;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: .01em;
  transition: color .2s;
  position: relative;
}
.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -3px; left: 0;
  width: 0; height: 1px;
  background: var(--accent);
  transition: width .2s ease;
}
.nav-links a:hover { color: var(--text); }
.nav-links a:hover::after { width: 100%; }

/* Hamburger button */
.nav-toggle {
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  width: 36px; height: 36px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px;
  z-index: 201;
}
.nav-toggle span {
  display: block;
  height: 2px;
  background: var(--text);
  border-radius: 2px;
  transition: transform .25s ease, opacity .2s ease;
}

/* Mobile drawer */
.nav-drawer {
  display: none; /* shown via JS class */
  position: fixed;
  top: var(--nav-h);
  left: 0; right: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 1.5rem clamp(1.25rem, 5vw, 3rem) 2rem;
  flex-direction: column;
  gap: .25rem;
  z-index: 199;
  animation: slideDown .2s ease;
}
.nav-drawer.open { display: flex; }
.nav-drawer a {
  font-family: var(--display);
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--muted);
  padding: .65rem 0;
  border-bottom: 1px solid var(--border);
  transition: color .15s;
}
.nav-drawer a:last-child { border-bottom: none; }
.nav-drawer a:hover { color: var(--text); }

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Hamburger animation when open */
.nav-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.nav-toggle.open span:nth-child(2) { opacity: 0; }
.nav-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* ── Pipeline accent line ─────────────────────────── */
.pipeline {
  height: 2px;
  background: linear-gradient(90deg,transparent,var(--accent) 30%,rgba(232,169,77,.4) 70%,transparent);
  background-size: 200% 100%;
  background-position: -100% 0;
  animation: pipe 1.4s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes pipe {
  from { background-position: -100% 0; opacity: .3; }
  to   { background-position:  100% 0; opacity: 1; }
}
@media (prefers-reduced-motion: reduce) {
  .pipeline { animation: none; background-position: 100% 0; }
}

/* ── Main ─────────────────────────────────────────── */
main {
  flex: 1;
  width: 100%;
  max-width: 780px;
  margin: 0 auto;
  padding: clamp(2rem, 5vw, 4rem) clamp(1.25rem, 5vw, 2.5rem) clamp(3rem, 8vw, 6rem);
}

/* ── Typography ───────────────────────────────────── */
h1, h2, h3, h4 {
  font-family: var(--display);
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -.02em;
}
h1 { font-size: clamp(1.9rem, 5vw, 3rem);   margin-bottom: .9rem; }
h2 { font-size: clamp(1.3rem, 3vw, 1.85rem); margin-bottom: .7rem; }
h3 { font-size: clamp(1.05rem, 2.5vw, 1.25rem); margin-bottom: .5rem; }

p  { margin-bottom: 1.2rem; opacity: .88; }
p:last-child { margin-bottom: 0; }

.eyebrow {
  font-family: var(--display);
  font-size: .72rem;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: .55rem;
  display: block;
}

/* ── Card ─────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: clamp(1.2rem, 3vw, 1.75rem);
  transition: border-color .2s, transform .2s;
}
.card:hover {
  border-color: rgba(232,169,77,.4);
  transform: translateY(-2px);
}

/* ── Tag ──────────────────────────────────────────── */
.tag {
  display: inline-block;
  font-family: var(--display);
  font-size: .68rem;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  background: var(--accent-glow);
  color: var(--accent);
  border: 1px solid rgba(232,169,77,.25);
  padding: .2rem .55rem;
  border-radius: 4px;
}

/* ── Accent link ──────────────────────────────────── */
.link-accent {
  color: var(--accent);
  font-weight: 500;
  transition: opacity .15s;
}
.link-accent:hover { opacity: .7; }

/* ── Divider ──────────────────────────────────────── */
hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 2.5rem 0;
}

/* ── Code ─────────────────────────────────────────── */
code {
  font-size: .84em;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: .1em .4em;
  border-radius: 4px;
  color: var(--accent);
}
pre {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.25rem;
  overflow-x: auto;
  margin-bottom: 1.5rem;
}
pre code { background: none; border: none; padding: 0; color: var(--text); }

/* ── Footer ───────────────────────────────────────── */
footer {
  border-top: 1px solid var(--border);
  padding: 1.4rem clamp(1.25rem, 5vw, 3rem);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: .6rem;
}
.footer-name {
  font-family: var(--display);
  font-size: .78rem;
  font-weight: 600;
  color: var(--muted);
}
.footer-note {
  font-size: .76rem;
  color: var(--muted);
}

/* ── Responsive breakpoints ───────────────────────── */
@media (max-width: 640px) {
  /* Show hamburger, hide desktop links */
  .nav-toggle { display: flex; }
  .nav-links  { display: none; }

  footer { flex-direction: column; align-items: flex-start; }
}
</style>

</head>
<body>

<nav>
  <a href="/" class="nav-logo">Gbarabe Tordi Joseph</a>

  <!-- Desktop links -->
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/about/">About</a>
    <a href="/projects/">Projects</a>
    <a href="/blogs/">Blog</a>
    <a href="/who-is-gbarabe-tordi-joseph/">Who Is Gbarabe Tordi Joseph?</a>
  </div>

  <!-- Mobile hamburger -->
  <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- Mobile drawer -->
<nav class="nav-drawer" id="nav-drawer" aria-hidden="true">
  <a href="/">Home</a>
  <a href="/about/">About</a>
  <a href="/projects/">Projects</a>
  <a href="/blogs/">Blog</a>
</nav>

<div class="pipeline"></div>

<main>
  {% block content %}
  {% endblock %}
</main>

<footer>
  <span class="footer-name">Gbarabe Tordi Joseph</span>
  <span class="footer-note">Petroleum Engineering · Software Development · University of Port Harcourt</span>
</footer>

<script>
  const toggle = document.querySelector('.nav-toggle');
  const drawer = document.getElementById('nav-drawer');
  toggle.addEventListener('click', () => {
    const open = drawer.classList.toggle('open');
    toggle.classList.toggle('open', open);
    toggle.setAttribute('aria-expanded', open);
    drawer.setAttribute('aria-hidden', !open);
  });
  // Close drawer on link click
  drawer.querySelectorAll('a').forEach(a =>
    a.addEventListener('click', () => {
      drawer.classList.remove('open');
      toggle.classList.remove('open');
      toggle.setAttribute('aria-expanded', false);
      drawer.setAttribute('aria-hidden', true);
    })
  );
</script>

</body>
</html>
